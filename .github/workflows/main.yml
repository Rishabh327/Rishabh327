# ========================================================
# 🐍 SNAKE ANIMATION SETUP — Follow these steps:
#
# 1. Go to your GitHub repo: https://github.com/Rishabh327/Rishabh327
# 2. Click "Add file" > "Create new file"
# 3. Name it: .github/workflows/snake.yml
# 4. Paste EVERYTHING below this comment block into that file
# 5. Commit it
# 6. Go to Actions tab > "Generate Snake" > "Run workflow"
# 7. Done! The snake SVG will be generated automatically every 12 hours
# ========================================================

name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"  # Runs every 12 hours
  workflow_dispatch:          # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake Game from GitHub Contributions
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Rishabh327
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
